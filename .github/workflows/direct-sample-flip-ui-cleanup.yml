name: Direct Sample Flip UI Cleanup

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply direct source cleanup
        shell: python
        run: |
          from pathlib import Path

          repo = Path.cwd()
          main = repo / "apps/desktop/src/main.rs"
          cargo = repo / "apps/desktop/Cargo.toml"
          build = repo / "apps/desktop/build.rs"
          generated = repo / "apps/desktop/src/main_generated.rs"
          workflow = repo / ".github/workflows/direct-sample-flip-ui-cleanup.yml"

          text = main.read_text()
          load_button = '''                    if ui.button("Load WAV to pad").clicked() {
                        self.load_wav_to_selected_pad();
                    }
'''
          flip_button = '''                    if ui.button("Flip WAV to active bank").clicked() {
                        self.flip_wav_to_active_bank();
                    }
'''
          load_count = text.count(load_button)
          if load_count != 2:
              raise SystemExit(f"expected exactly two Load WAV button sites, found {load_count}")
          if "flip_wav_to_active_bank" not in text:
              text = text.replace(load_button, load_button + flip_button)

          method_anchor = "    fn clear_runtime_sample_payloads(&mut self, reason: &str) {\n"
          if method_anchor not in text:
              raise SystemExit("missing clear_runtime_sample_payloads anchor")
          method = '''    fn flip_wav_to_active_bank(&mut self) {
        let path = self.sample_import_path.trim().to_string();
        if path.is_empty() {
            let message = "Sample flip failed: path is empty".to_string();
            self.last_runtime_sample_status = message.clone();
            self.last_status = message;
            return;
        }

        let payload = match load_wav_sample_payload(&path) {
            Ok(payload) => payload,
            Err(error) => {
                let message = format!("Sample flip failed: {error}");
                self.last_runtime_sample_status = message.clone();
                self.last_status = message;
                return;
            }
        };

        let bank = self.core.state().pad_bank;
        let sample_name = sample_name_from_path(&path);
        let source = mpc_core::SampleFlipSource {
            source_id: sample_name.clone(),
            source_title: sample_name.clone(),
            source_path: path.clone(),
            managed_copy_path: None,
            sample_rate_hz: payload.sample_rate_hz,
            frame_count: payload.length_frames_u32(),
            byte_count: payload.byte_count,
        };
        let plan = match mpc_core::build_pad_bank_sample_flip_plan(source, bank, None) {
            Ok(plan) => plan,
            Err(error) => {
                let message = format!("Sample flip plan failed: {error}");
                self.last_runtime_sample_status = message.clone();
                self.last_status = message;
                return;
            }
        };

        let mut snapshot = self.core.export_project_snapshot();
        if let Err(error) =
            mpc_core::apply_sample_flip_plan_to_project_snapshot(&mut snapshot, &plan)
        {
            let message = format!("Sample flip metadata failed: {error}");
            self.last_runtime_sample_status = message.clone();
            self.last_status = message;
            return;
        }
        if let Err(error) = self.core.restore_project_snapshot(snapshot) {
            let message = format!("Sample flip restore failed: {error}");
            self.last_runtime_sample_status = message.clone();
            self.last_status = message;
            return;
        }

        self.clear_runtime_sample_payloads("sample flip");
        let frame_count = payload.frame_count;
        let sample_rate_hz = payload.sample_rate_hz;
        let byte_count = payload.byte_count;
        for slice in &plan.slices {
            self.runtime_samples.insert(
                slice.sample_id.clone(),
                slice.sample_name.clone(),
                payload.clone(),
            );
            self.runtime_sample_statuses.insert(
                slice.sample_id.clone(),
                RuntimeSampleStatus::Loaded {
                    path: path.clone(),
                    frame_count,
                    sample_rate_hz,
                    byte_count,
                },
            );
        }

        self.last_audio_render = None;
        self.last_audio_render_error = None;
        self.last_runtime_sample_status = format!(
            "Sample flip: {} -> bank {} as {} pads ({} frames @ {} Hz)",
            sample_name,
            bank.label(),
            plan.slices.len(),
            frame_count,
            sample_rate_hz
        );
        self.last_status = self.last_runtime_sample_status.clone();
    }

'''
          if method not in text:
              text = text.replace(method_anchor, method + method_anchor)
          main.write_text(text)

          cargo.write_text('''[package]
name = "mpc_desktop"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
authors.workspace = true

[dependencies]
eframe.workspace = true
mpc_audio = { path = "../../crates/mpc_audio" }
mpc_core = { path = "../../crates/mpc_core" }
mpc_midi = { path = "../../crates/mpc_midi" }
mpc_storage = { path = "../../crates/mpc_storage" }
''')

          for path in (build, generated, workflow):
              if path.exists():
                  path.unlink()

      - name: Commit cleanup to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No cleanup changes to commit"
            exit 0
          fi
          git commit -m "Apply direct desktop sample flip UI cleanup"
          git push origin HEAD:main
