name: PR Cleanup Test

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ startsWith(github.head_ref, 'fix/direct-sample-flip-ui-review-cleanup') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - run: echo cleanup
