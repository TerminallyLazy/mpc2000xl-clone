name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            binary: mpc_desktop
            archive: mpc2000xl-clone-desktop-linux-x86_64.tar.gz
          - os: macos-latest
            label: macos-arm64
            binary: mpc_desktop
            archive: mpc2000xl-clone-desktop-macos-arm64.tar.gz
          - os: windows-latest
            label: windows-x86_64
            binary: mpc_desktop.exe
            archive: mpc2000xl-clone-desktop-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Build desktop app
        shell: bash
        run: cargo build --release -p mpc_desktop

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          cp README.md dist/README.md

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "${{ matrix.archive }}" -C dist .

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --title "MPC2000XL Clone ${tag}" \
              --notes "Desktop builds for Linux, macOS, and Windows. Project files remain metadata-only and do not embed audio bytes."
          fi
